<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f7f4ef, #e8dfd3);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .login-box h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #222;
    }

    .login-box p {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    .input-group input:focus {
      border-color: #2575fc;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 25px;
      gap: 10px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #333;
    }

    .options a {
      color: #2575fc;
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #2575fc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1a5fd0;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #333;
    }

    .signup-link a {
      color: #2575fc;
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 28px 22px;
      }

      .options {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Welcome Back</h1>
    <p>Please login to your account</p>

    <form>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          placeholder="Enter your email" 
          required 
        />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Enter your password" 
          required 
        />
      </div>

      <div class="options">
        <label>
          <input type="checkbox" />
          Remember me
        </label>

        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">Login</button>

      <div class="signup-link">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </div>
    </form>
  </div>

</body>
</html>
