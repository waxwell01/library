<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mide Library Sign Up</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f7f4ef, #e8dfd3);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .signup-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .logo-img {
      width: 160px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
    }

    h1 {
      font-size: 28px;
      color: #0b2a55;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 28px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #333;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
    }

    input:focus {
      border-color: #0b2a55;
      box-shadow: 0 0 0 3px rgba(11, 42, 85, 0.12);
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #0b2a55;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #071d3b;
      transform: translateY(-1px);
    }

    .login-link {
      margin-top: 22px;
      font-size: 14px;
      color: #666;
    }

    .login-link a {
      color: #0b2a55;
      font-weight: bold;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .signup-container {
        padding: 30px 22px;
      }

      .logo-img {
        width: 140px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="signup-container">
   <a href="index.html">
    <img src="logo.png" alt="Mide Library Logo" class="logo-img">
    </a>

    <h1>Create Account</h1>
    <p class="subtitle">Join Mide Library and get started today</p>

    <form>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          placeholder="Enter your full name" 
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          placeholder="Enter your email address" 
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Create a password" 
          required
        />
      </div>

      <button type="submit">Sign Up</button>
    </form>

    <p class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </p>

  </div>

</body>
</html>
